<style>

:root{
    --neon:#00ff9d;

*{
    box-sizing:border-box;
}

body{
    margin:0;

    font-family:monospace;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:

    rgba(0,255,157,.08),
    transparent 30%),

    rgba(255,122,0,.08),
    transparent 30%);

}

header{
    text-align:center;
    padding:28px 15px;
    font-size:34px;
    font-weight:bold;
    letter-spacing:2px;

    background:linear-gradient(90deg,var(--accent),var(--neon));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px var(--neon);
}

.grid{
    display:grid;
    gap:18px;
    max-width:980px;
    margin:auto;
    padding:15px;
}

.card{
    background:rgba(0,255,157,.04);
    border:1px solid rgba(0,255,157,.3);
    border-radius:18px;
    padding:20px;

    box-shadow:
    0 0 15px rgba(0,255,157,.08),
    inset 0 0 10px rgba(0,255,157,.04);

    backdrop-filter:blur(6px);

    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:
    0 0 22px rgba(0,255,157,.18);
}

.neon{
    font-size:19px;
    margin-bottom:14px;
    text-shadow:0 0 10px var(--neon);
}

.status{
    font-size:15px;
    line-height:1.9;
}

button,
.dl-btn{

    background:var(--neon);
    color:#000;

    border:none;
    border-radius:10px;

    padding:12px 18px;

    font-weight:bold;
    cursor:pointer;

    text-decoration:none;
    display:inline-block;

    margin:6px 4px;

    transition:.2s;
}

button:hover,
.dl-btn:hover{

    background:var(--accent);
    color:white;

    transform:scale(1.03);
}

.tg-btn{

    background:#229ED9;
    color:white;

    text-align:center;
    text-decoration:none;

    padding:16px;
    border-radius:12px;

    font-size:17px;
    font-weight:bold;

    box-shadow:0 0 15px rgba(34,158,217,.4);
}

.config-card{

    background:#0b0d10;
    border:1px dashed rgba(0,255,157,.35);

    padding:15px;
    border-radius:14px;

    margin-bottom:18px;
}

.config-box{

    background:#050607;

    padding:14px;
    border-radius:10px;

    word-break:break-all;

    font-size:13px;
    line-height:1.8;

    border:1px solid rgba(0,255,157,.2);

    margin-bottom:10px;
}

.badge{

    display:inline-block;

    padding:5px 10px;
    border-radius:20px;

    background:rgba(0,255,157,.15);

    margin-top:10px;

    font-size:12px;
}

.proxy-card{
    border:1px solid rgba(255,122,0,.35);
}

.proxy-btn{
    background:var(--accent);
    color:#fff;
}

.proxy-btn:hover{
    background:#ff9d42;
}

footer{

    text-align:center;
    padding:25px;

    opacity:.6;
    font-size:13px;
}

</style>

<script>

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

function beep(freq,time=.08){

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.connect(g);
    g.connect(audioCtx.destination);

    o.frequency.value = freq;
    g.gain.value = .04;

    o.start();
    o.stop(audioCtx.currentTime + time);
}

function copyConfig(text){

    navigator.clipboard.writeText(text);

    beep(700,.08);
    setTimeout(()=>beep(1100,.12),90);

    alert("✅ کپی شد");
}
function comingSoon(){

    beep(400,.08);
    setTimeout(()=>beep(250,.12),120);

    alert("🚧 این برنامه هنوز بارگذاری نشده\n⏳ به‌زودی اضافه می‌شود");

}
async function pingTest(url,el){

    el.innerHTML = "⏳ تست...";

    try{

        const start = Date.now();

        await fetch(url,{
            mode:"no-cors",
            cache:"no-cache"
        });

        const ping =
        Date.now() - start;

        let color =
        ping < 250
        ? "#00ff9d"
        : ping < 500
        ? "yellow"
        : "red";

        el.innerHTML =
        `⚡ <span style="color:${color}">
        ${ping}ms
        </span>`;

    }catch{

        el.innerHTML = "❌ خطا";

    }
}

async function loadData(){

let data = {

message:
"🟢 سامانه فعال است | کانفیگ‌ها به‌روز شدند",

configs:[],

proxies:[]
};

try{

const res =
await fetch(
"data.json?v="+Date.now()
);

if(res.ok){

data = await res.json();

}

}catch(e){}

document
.getElementById("msg")
.innerHTML = data.message;

/* CONFIGS */

const configs =
document.getElementById("configs");

configs.innerHTML = "";

(data.configs || [])
.forEach(cfg=>{

const box =
document.createElement("div");

box.className =
"config-card";

box.innerHTML = `

<div class="config-box">
${cfg.link}
</div>

<button onclick="copyConfig('${cfg.link}')">
📋 کپی
</button>

<button onclick="
pingTest(
'${cfg.testUrl || "https://google.com"}',
this.nextElementSibling
)">
⚡ تست پینگ
</button>

<span></span>

<div class="badge">
${cfg.type || "CONFIG"}
${cfg.remark ? " • "+cfg.remark : ""}
</div>

`;

configs.appendChild(box);

});

/* PROXIES */

const proxies =
document.getElementById("proxies");

proxies.innerHTML = "";

(data.proxies || [])
.forEach(proxy=>{

const box =
document.createElement("div");

box.className =
"config-card proxy-card";

box.innerHTML = `

<div class="config-box">
${proxy.link}
</div>

<button class="proxy-btn"
onclick="window.open('${proxy.link}','_blank')">
🚀 اتصال
</button>

<button onclick="copyConfig('${proxy.link}')">
📋 کپی
</button>

<div class="badge">
${proxy.type || "PROXY"}
${proxy.remark ? " • "+proxy.remark : ""}
</div>

`;

proxies.appendChild(box);

});

}

window.onload = ()=>{

loadData();

setInterval(loadData,20000);

setTimeout(()=>beep(300,.1),100);
setTimeout(()=>beep(600,.1),260);
setTimeout(()=>beep(900,.1),420);

};

</script>
